<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Margot's Magical Unicorn!</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    background: #1a0a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Georgia', serif;
    overflow: hidden;
    touch-action: none;
  }

  #gameWrapper {
    position: relative;
    width: 390px;
    height: 844px;
    overflow: hidden;
    border-radius: 40px;
    box-shadow: 0 0 60px rgba(255,150,255,0.4), 0 0 120px rgba(150,100,255,0.2);
  }

  #gameCanvas {
    display: block;
    width: 390px;
    height: 844px;
    image-rendering: pixelated;
  }

  #ui {
    position: absolute;
    top: 0; left: 0; right: 0;
    pointer-events: none;
    padding: 20px 24px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }

  #score {
    font-size: 28px;
    font-weight: bold;
    color: #fff;
    text-shadow: 0 0 10px #ff80ff, 0 2px 4px rgba(0,0,0,0.5);
    letter-spacing: 1px;
  }

  #lives {
    font-size: 22px;
    letter-spacing: 4px;
  }

  #overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: rgba(10, 5, 30, 0.88);
    border-radius: 40px;
    text-align: center;
    padding: 40px 30px;
    transition: opacity 0.4s;
  }

  #overlay h1 {
    font-size: 48px;
    color: #fff;
    text-shadow: 0 0 20px #ff80ff, 0 0 40px #cc60ff;
    margin-bottom: 8px;
    line-height: 1.1;
  }

  #overlay .subtitle {
    font-size: 18px;
    color: #ffccff;
    margin-bottom: 40px;
    text-shadow: 0 0 10px #ff80ff;
  }

  #overlay .instruction {
    font-size: 16px;
    color: #ddb0ff;
    margin-bottom: 12px;
    line-height: 1.5;
  }

  #startBtn {
    margin-top: 30px;
    padding: 18px 50px;
    font-size: 22px;
    font-family: 'Georgia', serif;
    font-weight: bold;
    color: #1a0a2e;
    background: linear-gradient(135deg, #ff80ff, #ffcc80, #80ffcc, #80ccff);
    background-size: 300% 300%;
    animation: rainbowBtn 3s linear infinite;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    pointer-events: all;
    box-shadow: 0 0 30px rgba(255,128,255,0.6);
    letter-spacing: 1px;
  }

  #startBtn:active { transform: scale(0.96); }

  @keyframes rainbowBtn {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  #overlay.hidden { opacity: 0; pointer-events: none; }

  #finalScore {
    font-size: 32px;
    color: #ffccff;
    margin: 10px 0 20px;
    text-shadow: 0 0 10px #ff80ff;
  }

  .star-decoration {
    font-size: 36px;
    margin-bottom: 10px;
    animation: twinkle 1.5s ease-in-out infinite alternate;
  }

  @keyframes twinkle {
    from { opacity: 0.6; transform: scale(0.9); }
    to { opacity: 1; transform: scale(1.1); }
  }
</style>
</head>
<body>

<div id="gameWrapper">
  <canvas id="gameCanvas" width="390" height="844"></canvas>
  
  <div id="ui">
    <div id="score">⭐ 0</div>
    <div id="lives">💖💖💖</div>
  </div>

  <div id="overlay">
    <div class="star-decoration">🦄✨🌈</div>
    <h1>Margot's Magical Unicorn!</h1>
    <div class="subtitle">Fly through the rainbow sky!</div>
    <div class="instruction">Tap or press Space / Up Arrow<br>to make your unicorn fly!</div>
    <div class="instruction">Collect stars ⭐ and avoid clouds ☁️</div>
    <button id="startBtn" onclick="startGame()">Let's Fly! 🦄</button>
  </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const W = 390, H = 844;

// ── Sprite sheet setup ──────────────────────────────────────────────
const spriteImg = new Image();
spriteImg.src = '/mnt/user-data/uploads/IMG_9822.png';

// The sheet is 6 columns × 6 rows of animation frames
// Each sprite ≈ 175×175 px in the original 1050×1050 image
const COLS = 6, ROWS = 6;
let spriteReady = false;
let spriteW, spriteH;
spriteImg.onload = () => {
  spriteW = spriteImg.width / COLS;
  spriteH = spriteImg.height / ROWS;
  spriteReady = true;
};

// ── Game state ──────────────────────────────────────────────────────
let state = 'idle'; // idle | playing | dead
let score = 0, lives = 3, hiScore = 0;
let frame = 0, tick = 0;

// Unicorn
let uni = { x: 80, y: H/2, vy: 0, frame: 0 };
const UNI_W = 110, UNI_H = 95;
const GRAVITY = 0.32, FLAP = -6.5, MAX_VY = 9;

// Obstacles (clouds)
let obstacles = [];
const OBS_GAP = 240;
const OBS_W = 70;
let obsTimer = 0;
const OBS_INTERVAL = 90;

// Stars / collectibles
let stars = [];
let starTimer = 0;

// Particles
let particles = [];

// Background layers
let bgStars = [];
let clouds = [];

function initBgStars() {
  bgStars = [];
  for (let i = 0; i < 80; i++) {
    bgStars.push({
      x: Math.random() * W,
      y: Math.random() * H,
      r: Math.random() * 1.8 + 0.4,
      speed: Math.random() * 0.3 + 0.1,
      twinkle: Math.random() * Math.PI * 2
    });
  }
}
initBgStars();

// ── Input ───────────────────────────────────────────────────────────
function flap() {
  if (state === 'playing') {
    uni.vy = FLAP;
    spawnParticles(uni.x + UNI_W * 0.5, uni.y + UNI_H * 0.7, '#ffccff', 6);
  }
}
document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); flap(); }
});
canvas.addEventListener('pointerdown', e => { e.preventDefault(); flap(); });
document.getElementById('gameWrapper').addEventListener('pointerdown', e => {
  if (state === 'playing') { e.preventDefault(); flap(); }
});

// ── Particles ───────────────────────────────────────────────────────
function spawnParticles(x, y, color, n) {
  for (let i = 0; i < n; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = Math.random() * 3 + 1;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 1,
      life: 1,
      color,
      r: Math.random() * 4 + 2
    });
  }
}

const RAINBOW = ['#ff4444','#ff8800','#ffdd00','#44dd44','#4488ff','#aa44ff'];
function spawnRainbow(x, y) {
  RAINBOW.forEach((c, i) => {
    for (let j = 0; j < 3; j++) {
      const angle = -Math.PI/2 + (Math.random()-0.5)*1.2;
      const speed = Math.random() * 4 + 2;
      particles.push({ x, y, vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed,
        life: 1, color: c, r: Math.random()*5+2 });
    }
  });
}

// ── Game init ───────────────────────────────────────────────────────
function startGame() {
  document.getElementById('overlay').classList.add('hidden');
  uni = { x: 80, y: H/2, vy: 0, frame: 0 };
  obstacles = []; stars = []; particles = [];
  score = 0; lives = 3; obsTimer = 0; starTimer = 0; tick = 0;
  state = 'playing';
  updateUI();
  loop();
}

function gameOver() {
  state = 'dead';
  hiScore = Math.max(hiScore, score);
  spawnRainbow(uni.x + UNI_W/2, uni.y + UNI_H/2);
  setTimeout(showGameOver, 800);
}

function showGameOver() {
  const ol = document.getElementById('overlay');
  ol.innerHTML = `
    <div class="star-decoration">🦄💫</div>
    <h1>Woohoo Margot!</h1>
    <div id="finalScore">⭐ ${score} Stars!</div>
    <div class="subtitle">Best: ⭐ ${hiScore}</div>
    <div class="instruction">You're a magical unicorn rider!</div>
    <button id="startBtn" onclick="startGame()">Fly Again! 🌈</button>
  `;
  ol.classList.remove('hidden');
}

function updateUI() {
  document.getElementById('score').textContent = `⭐ ${score}`;
  const heartsArr = ['💖','💖','💖'];
  for (let i = 0; i < 3; i++) { if (i >= lives) heartsArr[i] = '🖤'; }
  document.getElementById('lives').textContent = heartsArr.join('');
}

// ── Spawn helpers ────────────────────────────────────────────────────
function spawnObstacle() {
  const minH = 80, maxH = H - OBS_GAP - 80;
  const topH = Math.random() * (maxH - minH) + minH;
  obstacles.push({ x: W + 20, topH, speed: 2.8 + score * 0.015 });
}

function spawnStar() {
  stars.push({
    x: W + 20,
    y: Math.random() * (H - 160) + 80,
    speed: 2.5 + score * 0.01,
    angle: 0,
    collected: false
  });
}

// ── Draw helpers ─────────────────────────────────────────────────────
function drawBackground() {
  // Sky gradient
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#0d0520');
  grad.addColorStop(0.4, '#1a0840');
  grad.addColorStop(0.7, '#2a1060');
  grad.addColorStop(1, '#3d1080');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Twinkling stars
  tick++;
  bgStars.forEach(s => {
    s.x -= s.speed;
    if (s.x < -2) { s.x = W + 2; s.y = Math.random() * H; }
    s.twinkle += 0.05;
    const alpha = 0.5 + 0.5 * Math.sin(s.twinkle);
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
    ctx.fillStyle = `rgba(255,220,255,${alpha})`;
    ctx.fill();
  });

  // Nebula glow
  const ng = ctx.createRadialGradient(W*0.7, H*0.3, 0, W*0.7, H*0.3, 200);
  ng.addColorStop(0, 'rgba(200,80,255,0.08)');
  ng.addColorStop(1, 'transparent');
  ctx.fillStyle = ng;
  ctx.fillRect(0, 0, W, H);

  const ng2 = ctx.createRadialGradient(W*0.2, H*0.7, 0, W*0.2, H*0.7, 150);
  ng2.addColorStop(0, 'rgba(80,150,255,0.07)');
  ng2.addColorStop(1, 'transparent');
  ctx.fillStyle = ng2;
  ctx.fillRect(0, 0, W, H);
}

function drawObstacle(obs) {
  // Cloud-style obstacle (purple glowing)
  const drawCloud = (x, y, w, h) => {
    ctx.save();
    const g = ctx.createLinearGradient(x, y, x, y+h);
    g.addColorStop(0, '#8855cc');
    g.addColorStop(1, '#441188');
    ctx.fillStyle = g;
    ctx.shadowColor = '#cc88ff';
    ctx.shadowBlur = 18;
    ctx.beginPath();
    ctx.roundRect(x, y, w, h, 16);
    ctx.fill();
    // Cloud puffs on the edges
    const puffY = obs.topH < H/2 ? obs.topH : obs.topH + OBS_GAP;
    const py = (y + h === obs.topH) ? obs.topH : obs.topH + OBS_GAP;
    ctx.restore();
  };
  // Top pillar
  drawCloud(obs.x - OBS_W/2, 0, OBS_W, obs.topH);
  // Bottom pillar
  drawCloud(obs.x - OBS_W/2, obs.topH + OBS_GAP, OBS_W, H - obs.topH - OBS_GAP);

  // Cloud puff decorations at gap edges
  ctx.save();
  ctx.fillStyle = 'rgba(200,150,255,0.5)';
  ctx.shadowColor = '#ffffff';
  ctx.shadowBlur = 10;
  [obs.topH, obs.topH + OBS_GAP].forEach(gy => {
    for (let i = 0; i < 3; i++) {
      ctx.beginPath();
      ctx.arc(obs.x - OBS_W/2 + i*14 + 12, gy, 14 - i*2, 0, Math.PI*2);
      ctx.fill();
    }
  });
  ctx.restore();
}

function drawStar(star) {
  star.angle += 0.06;
  const s = 16;
  ctx.save();
  ctx.translate(star.x, star.y);
  ctx.rotate(star.angle);
  ctx.shadowColor = '#ffff80';
  ctx.shadowBlur = 20;
  ctx.fillStyle = '#ffee44';
  ctx.beginPath();
  for (let i = 0; i < 5; i++) {
    const a = (i*4*Math.PI/5) - Math.PI/2;
    const ia = a + 2*Math.PI/5;
    i === 0 ? ctx.moveTo(Math.cos(a)*s, Math.sin(a)*s) : ctx.lineTo(Math.cos(a)*s, Math.sin(a)*s);
    ctx.lineTo(Math.cos(ia)*s*0.4, Math.sin(ia)*s*0.4);
  }
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

function drawUnicorn() {
  if (!spriteReady) return;

  // Animate through frames
  if (tick % 6 === 0) uni.frame = (uni.frame + 1) % (COLS * ROWS);
  const col = uni.frame % COLS;
  const row = Math.floor(uni.frame / COLS);

  const tilt = Math.max(-0.3, Math.min(0.3, uni.vy * 0.025));

  ctx.save();
  ctx.translate(uni.x + UNI_W/2, uni.y + UNI_H/2);
  ctx.rotate(tilt);

  // Glow
  ctx.shadowColor = '#ff99ff';
  ctx.shadowBlur = 20;

  // Mirror horizontally (face right)
  ctx.scale(-1, 1);

  ctx.drawImage(
    spriteImg,
    col * spriteW, row * spriteH, spriteW, spriteH,
    -UNI_W/2, -UNI_H/2, UNI_W, UNI_H
  );
  ctx.restore();
}

function drawParticles() {
  particles.forEach(p => {
    ctx.save();
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 8;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  });
}

// ── Collision ────────────────────────────────────────────────────────
function rectsOverlap(ax,ay,aw,ah, bx,by,bw,bh) {
  return ax < bx+bw && ax+aw > bx && ay < by+bh && ay+ah > by;
}

function checkCollisions() {
  const ux = uni.x + 10, uy = uni.y + 8, uw = UNI_W - 20, uh = UNI_H - 16;

  obstacles.forEach(obs => {
    const ox = obs.x - OBS_W/2;
    const topOverlap = rectsOverlap(ux,uy,uw,uh, ox,0,OBS_W,obs.topH);
    const botOverlap = rectsOverlap(ux,uy,uw,uh, ox,obs.topH+OBS_GAP,OBS_W,H);
    if (topOverlap || botOverlap) {
      spawnParticles(uni.x+UNI_W/2, uni.y+UNI_H/2, '#ff6688', 12);
      lives--;
      obs.x = -200; // remove
      updateUI();
      if (lives <= 0) { gameOver(); return; }
    }
  });

  stars = stars.filter(s => {
    if (!s.collected && rectsOverlap(ux,uy,uw,uh, s.x-16,s.y-16,32,32)) {
      s.collected = true;
      score++;
      spawnRainbow(s.x, s.y);
      updateUI();
      return false;
    }
    return !s.collected;
  });
}

// ── Main loop ────────────────────────────────────────────────────────
let animId;
function loop() {
  if (state !== 'playing') return;
  animId = requestAnimationFrame(loop);

  // Physics
  uni.vy = Math.min(uni.vy + GRAVITY, MAX_VY);
  uni.y += uni.vy;

  // Bounds
  if (uni.y < 0) { uni.y = 0; uni.vy = 0; }
  if (uni.y + UNI_H > H) { gameOver(); return; }

  // Spawn
  obsTimer++;
  if (obsTimer >= OBS_INTERVAL) { spawnObstacle(); obsTimer = 0; }
  starTimer++;
  if (starTimer >= 55) { spawnStar(); starTimer = 0; }

  // Move obstacles
  obstacles.forEach(o => o.x -= o.speed);
  obstacles = obstacles.filter(o => o.x > -OBS_W);

  // Move stars
  stars.forEach(s => s.x -= s.speed);
  stars = stars.filter(s => s.x > -30);

  // Update particles
  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.1;
    p.life -= 0.025;
  });
  particles = particles.filter(p => p.life > 0);

  checkCollisions();

  // Draw
  drawBackground();
  obstacles.forEach(drawObstacle);
  stars.forEach(drawStar);
  drawParticles();
  drawUnicorn();

  // Speed hint text
  if (tick < 120) {
    ctx.save();
    ctx.globalAlpha = Math.max(0, 1 - tick/80);
    ctx.fillStyle = '#ffccff';
    ctx.font = 'bold 18px Georgia';
    ctx.textAlign = 'center';
    ctx.shadowColor = '#ff80ff';
    ctx.shadowBlur = 10;
    ctx.fillText('Tap to fly! ✨', W/2, H - 60);
    ctx.restore();
  }
}
</script>
</body>
</html>
