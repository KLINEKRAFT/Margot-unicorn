<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Margot's Unicorn Quest</title>

<style>

body{
margin:0;
overflow:hidden;
background:#000;
}

canvas{
image-rendering:pixelated;
}

</style>

</head>
<body>

<canvas id="game"></canvas>

<script>

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

const TILE=64

const STATE={
TITLE:0,
PLAY:1,
PAUSE:2,
GAMEOVER:3
}

let state=STATE.TITLE

let cameraX=0

let score=0
let gems=0
let lives=3

let highScore=localStorage.getItem("unicornScore")||0

function saveScore(){
localStorage.setItem("unicornScore",score)
}

function sound(freq){

let ac=new AudioContext()
let o=ac.createOscillator()
let g=ac.createGain()

o.connect(g)
g.connect(ac.destination)

o.frequency.value=freq
o.start()

g.gain.exponentialRampToValueAtTime(
0.0001,
ac.currentTime+0.15
)

}

const unicorn=new Image()
unicorn.src="margot_unicorn_run.png"

const tiles=new Image()
tiles.src="tiles.png"

const back=new Image()
back.src="forest_back.png"

const mid=new Image()
mid.src="forest_mid.png"

const front=new Image()
front.src="forest_front.png"

let player={
x:200,
y:300,
vx:0,
vy:0,
w:80,
h:80,
frame:0
}

let gravity=0.6

const keys={}

document.addEventListener("keydown",e=>{

keys[e.key]=true

if(e.key==="Escape")togglePause()

})

document.addEventListener("keyup",e=>{

keys[e.key]=false

})

function togglePause(){

if(state===STATE.PLAY)state=STATE.PAUSE
else if(state===STATE.PAUSE)state=STATE.PLAY

}

canvas.addEventListener("click",()=>{

if(state===STATE.TITLE){

state=STATE.PLAY
sound(800)

}

})

let terrain=[]

function generateTerrain(){

terrain=[]

for(let i=0;i<300;i++){

let height=450+Math.sin(i*0.4)*40

terrain.push(height)

}

}

generateTerrain()

let gemsList=[]

for(let i=5;i<300;i+=12){

gemsList.push({
x:i*TILE,
y:300,
spark:Math.random()*10,
collected:false
})

}

let enemies=[]

for(let i=10;i<300;i+=20){

enemies.push({
x:i*TILE,
y:420,
dir:1
})

}

function update(){

if(state!==STATE.PLAY)return

if(keys["ArrowRight"])player.vx=6
else if(keys["ArrowLeft"])player.vx=-6
else player.vx=0

if(keys["ArrowUp"]&&player.vy===0){

player.vy=-14
sound(900)

}

player.vy+=gravity

player.x+=player.vx
player.y+=player.vy

let ground=terrain[Math.floor(player.x/TILE)]

if(player.y>ground){

player.y=ground
player.vy=0

}

cameraX=player.x-200

score=Math.floor(player.x)

if(score>highScore){
highScore=score
saveScore()
}

for(let g of gemsList){

if(!g.collected){

if(Math.abs(player.x-g.x)<50){

g.collected=true
gems++
score+=200
sound(1200)

}

}

}

for(let e of enemies){

e.x+=e.dir*2

if(Math.abs(player.x-e.x)<40){

lives--
sound(200)

if(lives<=0){
state=STATE.GAMEOVER
}

}

}

}

function drawParallax(){

ctx.drawImage(back,-cameraX*0.2,0)
ctx.drawImage(mid,-cameraX*0.4,0)
ctx.drawImage(front,-cameraX*0.6,0)

}

function drawGround(){

for(let i=0;i<terrain.length;i++){

ctx.drawImage(
tiles,
0,0,64,64,
i*TILE-cameraX,
terrain[i]+TILE,
64,64
)

}

}

function drawPlayer(){

ctx.drawImage(
unicorn,
0,0,256,256,
player.x-cameraX,
player.y-80,
120,
120
)

}

function drawGems(){

for(let g of gemsList){

if(!g.collected){

let sparkle=Math.sin(g.spark+=0.1)*6

ctx.fillStyle="#0ff"

ctx.beginPath()

ctx.arc(
g.x-cameraX,
g.y+sparkle,
8,
0,
Math.PI*2
)

ctx.fill()

}

}

}

function drawEnemies(){

ctx.fillStyle="purple"

for(let e of enemies){

ctx.fillRect(
e.x-cameraX,
e.y,
40,
40
)

}

}

function drawHUD(){

ctx.fillStyle="black"
ctx.fillRect(20,20,240,120)

ctx.fillStyle="white"
ctx.font="20px monospace"

ctx.fillText("Score:"+score,40,50)
ctx.fillText("Gems:"+gems,40,80)
ctx.fillText("Lives:"+lives,40,110)

}

function drawTitle(){

ctx.fillStyle="black"
ctx.fillRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="white"
ctx.font="60px monospace"
ctx.textAlign="center"

ctx.fillText(
"Margot's Unicorn Quest",
canvas.width/2,
canvas.height/2-60
)

ctx.font="30px monospace"

ctx.fillText(
"Click To Start",
canvas.width/2,
canvas.height/2+40
)

}

function drawGameOver(){

ctx.fillStyle="black"
ctx.fillRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="white"

ctx.font="50px monospace"
ctx.textAlign="center"

ctx.fillText(
"Game Over",
canvas.width/2,
canvas.height/2
)

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

if(state===STATE.TITLE){
drawTitle()
return
}

drawParallax()

drawGround()

drawGems()

drawEnemies()

drawPlayer()

drawHUD()

if(state===STATE.PAUSE){

ctx.fillStyle="rgba(0,0,0,0.6)"
ctx.fillRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="white"
ctx.font="40px monospace"

ctx.fillText("Paused",canvas.width/2,canvas.height/2)

}

if(state===STATE.GAMEOVER){
drawGameOver()
}

}

function loop(){

update()
draw()

requestAnimationFrame(loop)

}

loop()

</script>

</body>
</html>
